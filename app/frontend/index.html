<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studio Hub KH</title>
<style>
  :root {
    --bg: #0d1117; --panel: #161b22; --panel2: #1c2129; --border: #2d333b;
    --text: #e6edf3; --dim: #8b949e; --accent: #58a6ff;
    --up: #3fb950; --down: #f85149; --warn: #d29922;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font: 14px/1.5 -apple-system, "SF Pro Text", "Segoe UI", sans-serif; }
  header { display: flex; align-items: center; gap: 12px; padding: 14px 22px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg); z-index: 5; }
  header h1 { font-size: 17px; font-weight: 700; }
  header .ver { color: var(--dim); font-size: 12px; }
  header .spacer { flex: 1; }
  .updot { width: 8px; height: 8px; border-radius: 50%; background: var(--up); display: inline-block; }
  nav { display: flex; gap: 4px; padding: 10px 22px 0; border-bottom: 1px solid var(--border); }
  nav button { background: none; border: none; color: var(--dim); font: inherit; padding: 8px 14px; cursor: pointer; border-bottom: 2px solid transparent; }
  nav button.active { color: var(--text); border-bottom-color: var(--accent); }
  main { padding: 20px 22px; max-width: 1200px; margin: 0 auto; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px; }
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
  .card .top { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .card .emoji { font-size: 22px; }
  .card h3 { font-size: 15px; flex: 1; }
  .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .dot.up { background: var(--up); box-shadow: 0 0 6px var(--up); }
  .dot.down { background: var(--down); }
  .dot.unknown { background: var(--dim); }
  .kv { display: grid; grid-template-columns: auto 1fr; gap: 2px 14px; font-size: 12.5px; }
  .kv dt { color: var(--dim); }
  .kv dd { text-align: right; font-variant-numeric: tabular-nums; }
  .card a.open { display: inline-block; margin-top: 10px; color: var(--accent); text-decoration: none; font-size: 12.5px; }
  .card a.open:hover { text-decoration: underline; }
  .bar { height: 8px; background: var(--panel2); border-radius: 4px; overflow: hidden; margin: 6px 0 2px; }
  .bar i { display: block; height: 100%; background: var(--accent); border-radius: 4px; transition: width .4s; }
  .bar i.hot { background: var(--warn); }
  .bar i.crit { background: var(--down); }
  .hostcard { margin-bottom: 18px; }
  .hostcard .row { display: flex; gap: 30px; flex-wrap: wrap; }
  .hostcard .stat b { font-size: 20px; font-weight: 700; }
  .hostcard .stat span { color: var(--dim); font-size: 12px; display: block; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--border); }
  th { color: var(--dim); font-weight: 600; font-size: 12px; position: sticky; top: 0; background: var(--bg); }
  td.num { font-variant-numeric: tabular-nums; }
  .pill { display: inline-block; padding: 1px 8px; border-radius: 999px; font-size: 11px; border: 1px solid var(--border); color: var(--dim); }
  .pill.dl { color: var(--up); border-color: var(--up); }
  .pill.cloud { color: var(--accent); border-color: var(--accent); }
  .toolbar { display: flex; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
  .toolbar input, .toolbar select { background: var(--panel); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 7px 12px; font: inherit; }
  .toolbar input { flex: 1; min-width: 200px; }
  .muted { color: var(--dim); }
  .empty { color: var(--dim); padding: 30px; text-align: center; }
  #tab-models, #tab-resources { display: none; }
</style>
</head>
<body>
<header>
  <span style="font-size:20px">🛰️</span>
  <h1>Studio Hub KH</h1>
  <span class="ver" id="hub-ver"></span>
  <div class="spacer"></div>
  <span class="muted" id="last-refresh"></span>
</header>
<nav>
  <button class="active" data-tab="overview">Overview</button>
  <button data-tab="models">Models</button>
  <button data-tab="resources">Resources</button>
</nav>
<main>
  <section id="tab-overview"><div class="grid" id="studio-grid"></div></section>

  <section id="tab-models">
    <div class="toolbar">
      <input id="m-search" placeholder="Search models…">
      <select id="m-modality">
        <option value="">All modalities</option>
        <option value="image">Image</option><option value="chat">Chat</option>
        <option value="voice">Voice</option><option value="music">Music</option>
        <option value="video">Video</option>
      </select>
      <select id="m-lane">
        <option value="">Local + Cloud</option>
        <option value="false">Local only</option>
        <option value="true">Cloud only</option>
      </select>
      <select id="m-dl">
        <option value="">Any state</option>
        <option value="true">Downloaded</option>
        <option value="false">Not downloaded</option>
      </select>
    </div>
    <div id="m-count" class="muted" style="margin-bottom:8px"></div>
    <div style="max-height:70vh;overflow:auto">
      <table><thead><tr>
        <th>Model</th><th>Studio</th><th>Family</th><th>Size</th><th>Min RAM</th><th>State</th>
      </tr></thead><tbody id="m-body"></tbody></table>
    </div>
  </section>

  <section id="tab-resources">
    <div class="card hostcard">
      <div class="top"><span class="emoji">🍏</span><h3>Host — unified memory</h3></div>
      <div class="row" id="host-stats"></div>
      <div class="bar"><i id="host-mem-bar"></i></div>
      <div class="muted" id="host-mem-label" style="font-size:12px"></div>
    </div>
    <table><thead><tr>
      <th>Studio</th><th>Status</th><th>PID</th><th>Memory (RSS)</th><th>CPU %</th><th>Procs</th>
    </tr></thead><tbody id="r-body"></tbody></table>
  </section>
</main>

<script>
const $ = (s) => document.querySelector(s);
let lastSummary = null;

// ── tabs ──────────────────────────────────────────────────────────────────
document.querySelectorAll("nav button").forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll("nav button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    ["overview", "models", "resources"].forEach(t =>
      $("#tab-" + t).style.display = (t === btn.dataset.tab ? "block" : "none"));
    if (btn.dataset.tab === "models") loadModels();
  };
});

// ── overview ──────────────────────────────────────────────────────────────
function fmtAgo(ts) {
  if (!ts) return "never";
  const s = Math.max(0, (Date.now() / 1000) - ts);
  if (s < 90) return Math.round(s) + "s ago";
  if (s < 5400) return Math.round(s / 60) + "m ago";
  return Math.round(s / 3600) + "h ago";
}

function studioUrl(s) {
  // Browser-reachable URL: the page's own hostname works for local studios
  // when the dashboard is viewed over LAN/Tailscale too.
  const host = (s.host === "127.0.0.1" || s.host === "0.0.0.0")
    ? location.hostname : s.host;
  return `http://${host}:${s.port}`;
}

function renderOverview(sum) {
  $("#hub-ver").textContent = "v" + sum.hub.app_version;
  const grid = $("#studio-grid");
  grid.innerHTML = "";
  for (const s of sum.studios) {
    const res = sum.resources.studios[s.id];
    const cls = s.status === "up" ? "up" : (s.status === "unknown" ? "unknown" : "down");
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <div class="top">
        <span class="emoji">${s.emoji || "🧩"}</span>
        <h3>${s.title}</h3>
        <span class="dot ${cls}" title="${s.status}"></span>
      </div>
      <dl class="kv">
        <dt>Status</dt><dd>${s.status}</dd>
        <dt>Version</dt><dd>${s.app_version || "—"}</dd>
        <dt>Address</dt><dd>${s.host}:${s.port}</dd>
        <dt>Machine</dt><dd>${s.machine || "local"}</dd>
        <dt>Latency</dt><dd>${s.latency_ms != null ? s.latency_ms + " ms" : "—"}</dd>
        <dt>Memory</dt><dd>${res ? res.rss_gb + " GB" : "—"}</dd>
        <dt>Last seen</dt><dd>${fmtAgo(s.last_seen)}</dd>
      </dl>
      ${s.status === "up" ? `<a class="open" href="${studioUrl(s)}" target="_blank">Open UI ↗</a>` : ""}
    `;
    grid.appendChild(card);
  }
}

// ── resources ─────────────────────────────────────────────────────────────
function renderResources(sum) {
  const h = sum.resources.host;
  $("#host-stats").innerHTML = `
    <div class="stat"><b>${h.used_gb} / ${h.total_gb} GB</b><span>memory used</span></div>
    <div class="stat"><b>${h.available_gb} GB</b><span>available</span></div>
    <div class="stat"><b>${h.cpu_percent}%</b><span>CPU (${h.cpu_count} cores)</span></div>
    <div class="stat"><b>${h.load_avg ? h.load_avg.join(" · ") : "—"}</b><span>load 1/5/15m</span></div>`;
  const bar = $("#host-mem-bar");
  bar.style.width = h.percent + "%";
  bar.className = h.percent > 90 ? "crit" : (h.percent > 75 ? "hot" : "");
  $("#host-mem-label").textContent = h.percent + "% of unified memory in use";

  const body = $("#r-body");
  body.innerHTML = "";
  for (const s of sum.studios) {
    const r = sum.resources.studios[s.id];
    body.insertAdjacentHTML("beforeend", `<tr>
      <td>${s.emoji || ""} ${s.title}</td>
      <td>${s.status}</td>
      <td class="num">${r ? r.pid : "—"}</td>
      <td class="num">${r ? r.rss_gb + " GB" : "—"}</td>
      <td class="num">${r ? r.cpu_percent : "—"}</td>
      <td class="num">${r ? r.processes : "—"}</td>
    </tr>`);
  }
}

// ── models ────────────────────────────────────────────────────────────────
async function loadModels() {
  const p = new URLSearchParams();
  const q = $("#m-search").value.trim(); if (q) p.set("q", q);
  const mod = $("#m-modality").value; if (mod) p.set("modality", mod);
  const lane = $("#m-lane").value; if (lane) p.set("cloud", lane);
  const dl = $("#m-dl").value; if (dl) p.set("downloaded", dl);
  const res = await fetch("/api/hub/catalog?" + p).then(r => r.json()).catch(() => null);
  const body = $("#m-body");
  if (!res) { body.innerHTML = `<tr><td colspan="6" class="empty">Catalog unavailable</td></tr>`; return; }
  $("#m-count").textContent = `${res.count} of ${res.total_unfiltered} models`;
  body.innerHTML = res.models.map(m => `<tr>
    <td><b>${m.label || m.repo || "?"}</b><br><span class="muted" style="font-size:11px">${m.repo || ""}</span></td>
    <td>${m.hub_studio}</td>
    <td>${m.family_label || m.family || "—"}</td>
    <td class="num">${m.size_gb != null ? m.size_gb + " GB" : "—"}</td>
    <td class="num">${m.min_unified_memory_gb != null ? m.min_unified_memory_gb + " GB" : "—"}</td>
    <td>${m.is_cloud ? '<span class="pill cloud">cloud</span>' : (m.cache ? '<span class="pill dl">downloaded</span>' : '<span class="pill">available</span>')}</td>
  </tr>`).join("") || `<tr><td colspan="6" class="empty">No models match</td></tr>`;
}
let mTimer;
["m-search", "m-modality", "m-lane", "m-dl"].forEach(id =>
  $("#" + id).addEventListener("input", () => { clearTimeout(mTimer); mTimer = setTimeout(loadModels, 250); }));

// ── poll loop ─────────────────────────────────────────────────────────────
async function refresh() {
  try {
    const sum = await fetch("/api/hub/summary").then(r => r.json());
    lastSummary = sum;
    renderOverview(sum);
    renderResources(sum);
    $("#last-refresh").textContent = "updated " + new Date().toLocaleTimeString();
  } catch (e) {
    $("#last-refresh").textContent = "hub unreachable";
  }
}
refresh();
setInterval(refresh, 5000);
</script>
</body>
</html>
